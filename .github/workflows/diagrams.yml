# OpenIM diagrams — Hybrid D static-site generator + D2 → GitHub Pages
#
# Builds the publish-grade diagram set from text sources:
#   - Hybrid D static site (Python generator parses the model markdown
#     directly; lays out via Graphviz; emits static HTML + SVG).
#   - D2 SVG for the entity-model core ERD and the layer-stack diagram.
#   - Single static site under dist/ deployed to GitHub Pages.
#
# Triggers on push to main and via workflow_dispatch for manual runs.

name: diagrams

on:
  push:
    branches:
      - main
    paths:
      - 'model/**/*.md'
      - 'model/ownership-map.md'
      - 'model/diagrams/d2/**'
      - 'tools/diagrams/**'
      - '.github/workflows/diagrams.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # Graphviz binary — `dot` and `sfdp` are required by the generator.
      # apt-get on Ubuntu pins to the distro version; ubuntu-latest carries
      # Graphviz 2.43+ which is comfortably above the generator's needs.
      - name: Install Graphviz
        run: |
          sudo apt-get update
          sudo apt-get install -y graphviz
          dot -V

      - name: Install generator dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r tools/diagrams/requirements.txt

      - name: Run parser tests
        run: |
          python -m unittest discover tools/diagrams/tests/

      - name: Build Hybrid D site
        run: |
          python tools/diagrams/build.py --out dist/

      # D2 install — direct binary download (no curl|sh) per the project's
      # diagram-tooling supply-chain review.
      # Pin checked: this URL is on github.com's official release server.
      - name: Install D2 (pinned, direct download)
        run: |
          curl -fLO https://github.com/terrastruct/d2/releases/download/v0.6.9/d2-v0.6.9-linux-amd64.tar.gz
          tar -xzf d2-v0.6.9-linux-amd64.tar.gz
          echo "$PWD/d2-v0.6.9/bin" >> $GITHUB_PATH
          ./d2-v0.6.9/bin/d2 --version

      - name: Render D2 SVGs alongside the generator output
        run: |
          mkdir -p dist/entities/core
          d2 --layout=elk model/diagrams/d2/core-erd.d2 dist/entities/core/core-erd.svg
          d2 --layout=elk model/diagrams/d2/layer-stack.d2 dist/layer-stack.svg

      # Downloadable zip — survives even if Pages is not enabled on the repo.
      # Fetch from the run page via the Actions UI or `gh run download <run-id>`.
      - name: Upload downloadable artefact
        uses: actions/upload-artifact@v4
        with:
          name: openim-diagrams
          path: dist/
          retention-days: 30

      # Pages-specific upload — used by the deploy job below.
      # Requires GitHub Pages to be enabled at repo level
      # (Settings → Pages → Build and deployment → Source: GitHub Actions).
      # If Pages is disabled, the steps below will fail but the artefact
      # uploaded above will still be downloadable from the run page.
      - name: Configure Pages
        if: success()
        continue-on-error: true
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        if: success()
        continue-on-error: true
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
