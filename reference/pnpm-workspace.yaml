# agentINVEST reference workspace (pnpm).
#
# This workspace standardises on pnpm — the running Restate instance is launched
# from the pnpm-based sibling repo, pnpm is the package manager the implementation
# plan named, and pnpm's workspace protocol is the clean way to tie the TS
# packages together as more are added (@agentinvest/canonical-model,
# @agentinvest/runtime). One lockfile at the root (pnpm-lock.yaml).
#
# The Python workspace (python/) is uv-managed and is NOT a pnpm package — uv
# owns its own lockfile (python/uv.lock). The two language workspaces are tied
# only by the shared Restate substrate they both register against, which is the
# polyglot seam. The dbt workspace (dbt/) likewise lives beside these without
# being a pnpm package.
packages:
  - ts
  # The Operator UI — a Next.js + Tailwind console (its own dep set:
  # next/react/tailwind). A separate pnpm package beside ts/; it CALLS the shared
  # Restate admin + ingress, it does not register a Restate deployment.
  - operator-ui
