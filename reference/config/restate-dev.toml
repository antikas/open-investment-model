# OpenIM-owned Restate dev-server config (agentINVEST substrate).
#
# This file is OpenIM's OWN copy of the Restate dev config — not a borrow from
# a sibling project sharing the dev substrate. A fresh OpenIM checkout boots its
# substrate using
# the OpenIM-owned launcher + installer + version pin alongside this file; it
# never reads the sibling project's source files. At dev time the *running*
# instance
# may be shared with that sibling (same binary, same ports — the ADR-0054
# default), but OpenIM owns its version contract.
#
# Binds the admin (9070) and HTTP ingress (8080) listeners to 127.0.0.1 so the
# server is reachable from the workstation (via WSL2's localhost-forwarding on
# Windows; natively on Mac/Linux) but never from the LAN. The ingress's handler
# set is open and un-authed, so it stays loopback by design.
#
# Node-to-node (5122) is left at upstream's 0.0.0.0 default — it carries no
# external traffic in single-node dev, and WSL2's NAT prevents LAN exposure.
#
# Pinned to the Restate version schema in scripts/install-restate.mjs
# (RESTATE_VERSION is the SSOT for the binary; this config is read by that
# pinned binary's `--config-file`).

[admin]
bind-address = "127.0.0.1:9070"

[ingress]
bind-address = "127.0.0.1:8080"
