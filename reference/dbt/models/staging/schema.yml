version: 2

# Tests on the staging models. The sample model (stg_sample_holdings) is the
# OIM-102 scaffold's pipeline proof; the ten BD-09 entity models below are
# OIM-103, each cross-checked against model/entities/core/E-NN-*.md.
#
# The unique + not_null tests on each entity's primary key are also the
# IDEMPOTENCY guard: a view-materialised staging model cannot duplicate rows, and
# these tests assert it. The tests are the key/uniqueness/not-null invariants the
# model files imply — the golden key is unique + not null; declared-required
# columns are not null; key-partitioned E-04 asserts the (position_id, book)
# composite uniqueness its `book`-in-identity shape requires.

models:
  # --- OIM-102 sample (generic, NOT a BD-09 entity) -------------------------
  - name: stg_sample_holdings
    description: >
      Generic sample staging model — a 1:1 typed view over the
      raw_sample_holdings seed, deriving market_value. Sample data, NOT a BD-09
      canonical entity (those are the stg_eNN_* models below).
    columns:
      - name: holding_id
        description: Surrogate key for the sample holding row.
        data_tests:
          - unique
          - not_null
      - name: portfolio_code
        description: The owning portfolio's code (sample).
        data_tests:
          - not_null
      - name: instrument_code
        description: The held instrument's code (sample).
        data_tests:
          - not_null
      - name: quantity
        description: Units held (sample).
        data_tests:
          - not_null
      - name: market_value
        description: quantity * price (derived).
        data_tests:
          - not_null

  # --- OIM-103 BD-09 canonical entities (E-01 ... E-20) ---------------------

  - name: stg_e01_legal_entity
    description: >
      E-01 Legal Entity — the universal party master (model/entities/core/
      E-01-legal-entity.md). Single owner (SD-13.2). Golden key: entity_id.
    columns:
      - name: entity_id
        description: "Golden key (model: varchar, primary key)."
        data_tests:
          - unique
          - not_null
      - name: entity_name
        data_tests: [not_null]
      - name: entity_type
        data_tests: [not_null]
      - name: status
        data_tests: [not_null]
      - name: first_seen_at
        data_tests: [not_null]

  - name: stg_e02_instrument_asset
    description: >
      E-02 Instrument / Asset — the universal holdable-thing master
      (model/entities/core/E-02-instrument-asset.md). Single owner (SD-13.1).
      Golden key: instrument_id.
    columns:
      - name: instrument_id
        description: "Golden key (model: varchar, primary key)."
        data_tests:
          - unique
          - not_null
      - name: instrument_name
        data_tests: [not_null]
      - name: instrument_class
        data_tests: [not_null]
      - name: asset_class
        description: FK -> E-09 asset_class_key (model declares int — matches E-09's integer PK).
        data_tests: [not_null]
      - name: currency
        data_tests: [not_null]
      - name: status
        data_tests: [not_null]

  - name: stg_e03_portfolio_mandate
    description: >
      E-03 Portfolio / Mandate — the capital container governed by a mandate
      (model/entities/core/E-03-portfolio-mandate.md). Faceted ownership
      (SD-05.2 portfolio facet + SD-01.2 mandate facet). Golden key: portfolio_id.
    columns:
      - name: portfolio_id
        description: "Golden key (model: varchar, primary key)."
        data_tests:
          - unique
          - not_null
      - name: portfolio_name
        data_tests: [not_null]
      - name: portfolio_type
        data_tests: [not_null]
      - name: mandate_objective
        description: The mandate facet's objective (model declares not-null).
        data_tests: [not_null]
      - name: base_currency
        data_tests: [not_null]
      - name: inception_date
        data_tests: [not_null]
      - name: status
        data_tests: [not_null]

  - name: stg_e04_holding_position
    description: >
      E-04 Holding / Position — what the investor owns, at two books of record
      (model/entities/core/E-04-holding-position.md). KEY-PARTITIONED BY `book`:
      SD-12.1 IBOR (book=ibor) + SD-12.2 ABOR (book=abor), co-equal.
      `book` is part of identity, so (position_id, book) is the natural composite
      key — the uniqueness test is on the composite, NOT position_id alone (the
      IBOR and ABOR rows share a position_id by design and diverge in value).
      The (position_id, book) composite uniqueness is asserted by the singular
      test tests/assert_e04_position_book_unique.sql.
    columns:
      - name: position_id
        description: "Primary key element (model: varchar). Shared across the two books."
        data_tests:
          - not_null
      - name: book
        description: "ibor / abor — the partition key, part of identity (model: varchar)."
        data_tests:
          - not_null
          - accepted_values:
              values: ['ibor', 'abor']
      - name: portfolio_id
        description: FK -> E-03.
        data_tests: [not_null]
      - name: instrument_id
        description: FK -> E-02.
        data_tests: [not_null]
      - name: as_of_date
        data_tests: [not_null]
      - name: currency
        data_tests: [not_null]

  - name: stg_e05_transaction
    description: >
      E-05 Transaction — the universal investment event (model/entities/core/
      E-05-transaction.md). Single owner (SD-12.1 IBOR). The event from which
      positions (E-04) are derived and cash flows (E-06) arise. trade_date /
      settlement_date / status carry the TD-SD timing that drives the IBOR/ABOR
      book divergence and the timing-break class.
    columns:
      - name: transaction_id
        description: "Primary key (model: varchar)."
        data_tests:
          - unique
          - not_null
      - name: transaction_type
        data_tests:
          - not_null
          - accepted_values:
              values: ['trade', 'subscription', 'redemption', 'capital_call', 'distribution', 'corporate_action', 'transfer', 'fee', 'income']
      - name: portfolio_id
        description: FK -> E-03.
        data_tests: [not_null]
      - name: instrument_id
        description: FK -> E-02.
        data_tests: [not_null]
      - name: trade_date
        data_tests: [not_null]
      - name: amount_usd
        data_tests: [not_null]
      - name: status
        data_tests:
          - not_null
          - accepted_values:
              values: ['pending', 'confirmed', 'settled', 'cancelled']
      - name: source
        data_tests: [not_null]

  - name: stg_e06_cash_flow_event
    description: >
      E-06 Cash Flow Event — the granular dated cash record (model/entities/core/
      E-06-cash-flow-event.md). Single owner (SD-12.1 IBOR). The cash consequence of
      a Transaction (E-05) where there is one; the signed, dated series is the IRR
      input. Ties to the holdings and the transactions.
    columns:
      - name: cash_flow_id
        description: "Primary key (model: varchar)."
        data_tests:
          - unique
          - not_null
      - name: portfolio_id
        description: FK -> E-03.
        data_tests: [not_null]
      - name: cash_flow_date
        data_tests: [not_null]
      - name: cash_flow_type
        data_tests:
          - not_null
          - accepted_values:
              values: ['contribution', 'distribution', 'coupon', 'dividend', 'fee', 'expense', 'income', 'principal', 'tax']
      - name: direction
        data_tests:
          - not_null
          - accepted_values:
              values: ['inflow', 'outflow']
      - name: amount
        data_tests: [not_null]
      - name: currency
        data_tests: [not_null]
      - name: source
        data_tests: [not_null]

  # --- the external comparator feed (SYNTHETIC; not canonical entities) ----
  # The custodian holdings/cash + administrator statement the firm reconciles its
  # internal book against. Derived from the internal book so most rows agree; a
  # labelled minority carry deliberately-injected breaks (the break_labels oracle).
  # NOT OpenIM entities — no model file, out of the schema-drift scope.

  - name: stg_custodian_holdings
    description: >
      The custodian's position record — the external comparator feed for position
      reconciliation (SD-12.10). Synthetic, derived from the internal IBOR book with
      labelled price / quantity / FX / timing breaks injected (break_note marks them;
      break_labels.csv catalogues them as the oracle).
    columns:
      - name: custodian_record_id
        data_tests:
          - unique
          - not_null
      - name: position_id
        data_tests: [not_null]
      - name: market_value_usd
        data_tests: [not_null]

  - name: stg_custodian_cash
    description: >
      The custodian's cash balances per fund — the external comparator feed for cash
      reconciliation (SD-12.10). Synthetic; left in agreement (the cash break is
      exercised on the administrator statement).
    columns:
      - name: custodian_cash_id
        data_tests:
          - unique
          - not_null
      - name: balance_usd
        data_tests: [not_null]

  - name: stg_admin_statement
    description: >
      The fund administrator's statement — transaction + cash + fund-level NAV lines the firm
      reconciles against (SD-12.10 transaction matching + cash reconciliation; the nav line is
      the SD-12.16 shadow-NAV oversight input). Synthetic; carries labelled missing/extra-
      transaction, cash and shadow-NAV-divergence breaks (break_labels.csv oracle).
    columns:
      - name: admin_record_id
        data_tests:
          - unique
          - not_null
      - name: record_type
        data_tests:
          - not_null
          - accepted_values:
              # 'nav' (OIM-197): the fund-level administrator NAV — the SD-12.16 shadow-NAV
              # oversight input (OIM-164), not an SD-12.10 reconcile surface.
              values: ['transaction', 'cash', 'nav']

  - name: stg_break_labels
    description: >
      The labelled-break oracle — every deliberately-injected break between the internal
      book and the comparator feed, in E-24 Reconciliation Break's vocabulary
      (reconciliation_type / cause_classification / materiality). The zero-missed-breaks
      ground truth a reconciliation eval scores an engine against. Also emitted as
      break_labels.json (the form the engine / eval read).
    columns:
      - name: break_id
        data_tests:
          - unique
          - not_null
      - name: reconciliation_type
        data_tests:
          - not_null
          - accepted_values:
              # 'nav' (OIM-197): the labelled shadow-NAV divergence — an SD-12.16 oversight
              # (E-36) surface (OIM-164), carried in the oracle but NOT an E-24 / SD-12.10
              # reconcile type (the OIM-162 engine reconciles position/cash/transaction/ibor_abor).
              values: ['position', 'cash', 'transaction', 'ibor_abor', 'custodian', 'counterparty', 'nav']
      - name: cause_classification
        data_tests:
          - not_null
          - accepted_values:
              values: ['timing', 'pricing', 'missing_transaction', 'data_error', 'fx', 'fees', 'unexplained']
      - name: materiality
        data_tests:
          - not_null
          - accepted_values:
              values: ['low', 'medium', 'high']
      - name: record_ref
        data_tests: [not_null]
      - name: expected_side
        data_tests:
          - not_null
          - accepted_values:
              values: ['custodian', 'internal']

  # --- the entity-resolution feed + oracle (OIM-199; SYNTHETIC, not canonical entities) ----
  # The inbound legal-entity feed the deterministic three-tier resolution cascade runs over, plus
  # the labelled oracle (true entity_id / NEW / AMBIGUOUS + difficulty tier). Derived to exercise the
  # difficulty gradient over the E-01 masters. NOT OpenIM entities — no model file, out of the
  # schema-drift scope.

  - name: stg_entity_resolution_feed
    description: >
      The inbound entity-resolution feed — legal-entity records from three named source systems
      (custodian / administrator / internal_onboarding) carrying labelled duplicates and variants of
      a subset of the E-01 masters plus net-new entities (SD-13.2 entity resolution, OIM-199).
      Synthetic; the cascade resolves it deterministically into golden records + a review queue.
    columns:
      - name: source_record_id
        data_tests:
          - unique
          - not_null
      - name: source_system
        data_tests:
          - not_null
          - accepted_values:
              values: ['custodian', 'administrator', 'internal_onboarding']
      - name: raw_name
        data_tests: [not_null]
      - name: received_at
        data_tests: [not_null]

  - name: stg_entity_resolution_labels
    description: >
      The labelled entity-resolution oracle — the TRUE canonical E-01 entity_id (or NEW / AMBIGUOUS)
      for every feed record, tagged with the difficulty tier (exact_lei / alias_match /
      name_variant_no_id / ambiguous). The ZERO-mis-merge ground truth the resolution eval scores the
      cascade against. Also emitted as entity_resolution_labels.json (the form the engine / eval read).
    columns:
      - name: source_record_id
        data_tests:
          - unique
          - not_null
      - name: resolution_outcome
        data_tests:
          - not_null
          - accepted_values:
              values: ['resolved', 'new', 'ambiguous']
      - name: difficulty_tier
        data_tests:
          - not_null
          - accepted_values:
              values: ['exact_lei', 'alias_match', 'name_variant_no_id', 'ambiguous']

  - name: stg_e07_valuation
    description: >
      E-07 Valuation — a point-in-time value of a holding, with how it was arrived
      at (model/entities/core/E-07-valuation.md). APPEND-ONLY (the valuation
      trajectory). This is the schema-faithful staging view (the as-of axis =
      valuation_date); the bi-temporal as-of/append-only materialisation is the
      int_e07_valuation_* models in the intermediate layer. Key-partitioned by
      `method` per the ownership map.
    columns:
      - name: valuation_id
        description: "Primary key (model: varchar). Append-only — each mark is a row."
        data_tests:
          - unique
          - not_null
      - name: position_id
        description: FK -> E-04.
        data_tests: [not_null]
      - name: valuation_date
        description: The as-of axis of the append-only trajectory.
        data_tests: [not_null]
      - name: value_usd
        data_tests: [not_null]
      - name: method
        data_tests: [not_null]
      - name: valuation_level
        data_tests: [not_null]
      - name: source
        data_tests: [not_null]

  - name: stg_e09_asset_class
    description: >
      E-09 Asset Class — the controlled asset-class taxonomy
      (model/entities/core/E-09-asset-class.md). Single owner (SD-13.4).
      Effective-dated reference data. Integer key: asset_class_key.
    columns:
      - name: asset_class_key
        description: "Primary key (model: int)."
        data_tests:
          - unique
          - not_null
      - name: asset_class_code
        data_tests: [not_null]
      - name: asset_class_label
        data_tests: [not_null]
      - name: markets
        description: public / private / both — the public-vs-private split.
        data_tests:
          - not_null
          - accepted_values:
              values: ['public', 'private', 'both']
      - name: effective_from
        data_tests: [not_null]

  - name: stg_e13_entity_alias
    description: >
      E-13 Entity Alias — a name a master record has been seen under
      (model/entities/core/E-13-entity-alias.md). APPEND-ONLY; key-partitioned by
      master kind (subject_type). Canonical for aliases (the masters' known_aliases
      arrays are a denormalised read-cache; see model/ownership-map.md).
    columns:
      - name: alias_id
        description: "Primary key (model: varchar). Append-only."
        data_tests:
          - unique
          - not_null
      - name: subject_type
        description: The master-kind partition key.
        data_tests:
          - not_null
          - accepted_values:
              values: ['legal_entity', 'instrument', 'fund', 'portfolio_company']
      - name: subject_id
        description: The golden key of the master record.
        data_tests: [not_null]
      - name: alias_name
        data_tests: [not_null]
      - name: first_seen_at
        data_tests: [not_null]
      - name: source
        data_tests: [not_null]

  - name: stg_e14_external_identifier
    description: >
      E-14 External Identifier — a cross-reference from a master's golden key to an
      external-system identifier (model/entities/core/E-14-external-identifier.md).
      Key-partitioned by master kind (subject_type). Canonical for external
      identifiers (the masters' external_ids maps are a denormalised read-cache;
      see model/ownership-map.md).
    columns:
      - name: external_id_record
        description: "Primary key (model: varchar)."
        data_tests:
          - unique
          - not_null
      - name: subject_type
        description: The master-kind partition key.
        data_tests:
          - not_null
          - accepted_values:
              values: ['legal_entity', 'instrument', 'fund', 'portfolio_company']
      - name: subject_id
        data_tests: [not_null]
      - name: external_system
        data_tests: [not_null]
      - name: external_id
        data_tests: [not_null]
      - name: id_type
        data_tests: [not_null]
      - name: verified
        description: "Whether the mapping is verified or a candidate (model: boolean)."
        data_tests: [not_null]

  - name: stg_e19_risk_measurement
    description: >
      E-19 Risk Measurement — a point-in-time risk result with its method and
      provenance (model/entities/core/E-19-risk-measurement.md). APPEND-ONLY. This
      is the schema-faithful staging view (the as-of axis = as_of_date); the
      bi-temporal materialisation is the int_e19_risk_* models in the intermediate
      layer. KEY-PARTITIONED by `risk_type` (the risk domain — the partition
      discriminator) backed by the model file's column; `measure_type` (the kind of
      number) is the orthogonal axis, kept alongside.
    columns:
      - name: measurement_id
        description: "Primary key — the surrogate row identity (model: varchar). Append-only."
        data_tests:
          - unique
          - not_null
      - name: risk_type
        description: "The risk domain (the partition key, model: varchar) — determines the producing capability."
        data_tests:
          - not_null
          - accepted_values:
              values: ['market', 'credit', 'counterparty', 'liquidity', 'concentration', 'scenario', 'stress', 'climate']
      - name: subject_type
        data_tests: [not_null]
      - name: subject_id
        data_tests: [not_null]
      - name: measure_type
        description: "The kind of number (model: varchar) — orthogonal to risk_type."
        data_tests: [not_null]
      - name: as_of_date
        description: The as-of axis of the append-only trajectory.
        data_tests: [not_null]
      - name: value
        data_tests: [not_null]
      - name: method
        data_tests: [not_null]
      - name: model_id
        description: The risk model (link to SD-14.4 governance).
        data_tests: [not_null]

  - name: stg_e20_performance_result
    description: >
      E-20 Performance Result — a stored point-in-time return figure with inputs,
      methodology version and provenance (model/entities/core/E-20-performance-result.md).
      Single owner (SD-09.1). APPEND-ONLY. This is the schema-faithful staging view
      (the as-of period = period_start..period_end); the bi-temporal materialisation
      is the int_e20_performance_* models in the intermediate layer.
    columns:
      - name: performance_result_id
        description: "Primary key (model: varchar). Append-only."
        data_tests:
          - unique
          - not_null
      - name: subject_type
        data_tests: [not_null]
      - name: subject_id
        data_tests: [not_null]
      - name: period_start
        data_tests: [not_null]
      - name: period_end
        description: The end of the period; the date the return is as of.
        data_tests: [not_null]
      - name: return_basis
        description: gross / net.
        data_tests:
          - not_null
          - accepted_values:
              values: ['gross', 'net']
      - name: return_method
        data_tests: [not_null]
      - name: return_value
        data_tests: [not_null]
      - name: metric_definition_id
        description: FK -> E-22 (the methodology version in force).
        data_tests: [not_null]
      - name: valuation_source
        data_tests: [not_null]

seeds:
  - name: raw_sample_holdings
    description: >
      Synthetic generic sample-holdings seed. Six rows across three sample
      portfolios. NOT the BD-09 synthetic dataset (that is the raw_eNN_* seeds).
    columns:
      - name: holding_id
        data_tests:
          - unique
          - not_null

  # The ten BD-09 entity seeds are minimal flat samples (OIM-103). The full
  # ~5000-row synthetic dataset is OIM-110. Seed-level key tests assert the
  # golden key is unique + not-null at the raw layer too.
  - name: raw_e01_legal_entity
    columns:
      - name: entity_id
        data_tests: [unique, not_null]
  - name: raw_e02_instrument_asset
    columns:
      - name: instrument_id
        data_tests: [unique, not_null]
  - name: raw_e03_portfolio_mandate
    columns:
      - name: portfolio_id
        data_tests: [unique, not_null]
  - name: raw_e04_holding_position
    columns:
      - name: position_id
        # NOT unique alone — (position_id, book) is the composite key; see the
        # model-level dbt_utils.unique_combination_of_columns test above.
        data_tests: [not_null]
  - name: raw_e05_transaction
    columns:
      - name: transaction_id
        data_tests: [unique, not_null]
  - name: raw_e06_cash_flow_event
    columns:
      - name: cash_flow_id
        data_tests: [unique, not_null]
  # The external comparator feed seeds (synthetic; not canonical entities).
  - name: raw_custodian_holdings
    columns:
      - name: custodian_record_id
        data_tests: [unique, not_null]
  - name: raw_custodian_cash
    columns:
      - name: custodian_cash_id
        data_tests: [unique, not_null]
  - name: raw_admin_statement
    columns:
      - name: admin_record_id
        data_tests: [unique, not_null]
  - name: break_labels
    columns:
      - name: break_id
        data_tests: [unique, not_null]
  - name: raw_e07_valuation
    columns:
      - name: valuation_id
        data_tests: [unique, not_null]
  - name: raw_e09_asset_class
    columns:
      - name: asset_class_key
        data_tests: [unique, not_null]
  - name: raw_e13_entity_alias
    columns:
      - name: alias_id
        data_tests: [unique, not_null]
  - name: raw_e14_external_identifier
    columns:
      - name: external_id_record
        data_tests: [unique, not_null]
  - name: raw_e19_risk_measurement
    columns:
      - name: measurement_id
        data_tests: [unique, not_null]
  - name: raw_e20_performance_result
    columns:
      - name: performance_result_id
        data_tests: [unique, not_null]
