version: 2

# The consumer-facing marts — the aggregates the tools and the NAV-strike and
# performance-appraisal workflows read. Materialised as tables (the project's marts
# convention). Each carries its invariant tests; the headline is the NAV invariant
# (NAV = Σ market values + accruals − fees, to a ratified NAV tolerance), tested
# falsifiably against an independent re-aggregation of the source in
# tests/assert_mart_fund_nav_invariant.sql.
#
# Honest boundary: these marts compute over synthetic data. A green pipeline — a green
# NAV invariant included — proves the data-layer arithmetic and the as-of plumbing, not
# a struck production NAV or a verified return. The fiduciary strike (matched to an
# independent shadow pipeline and a published GIPS/CFA oracle, to a ratified
# tolerance, behind a human approval gate) is later, oracle-anchored work.

models:
  - name: mart_portfolio_holdings
    description: >
      The position-level holdings fact per portfolio — one row per logical holding (the
      accounting / abor book), with its instrument, asset class, current valuation, and
      the fund the portfolio rolls up to. The holdings surface the tools read. Asset
      class resolves through the instrument by an integer foreign key (integer =
      integer). Synthetic data.
    columns:
      - name: position_id
        description: The logical holding (the abor book-row; one per holding here).
        data_tests: [unique, not_null]
      - name: fund_id
        description: The total-fund portfolio this holding's portfolio rolls up to.
        data_tests: [not_null]
      - name: market_value_usd
        description: The holding's accounting-book (abor) market value.
        data_tests: [not_null]
      - name: asset_class_key
        description: The asset class (integer key, resolved via the instrument).

  - name: mart_fund_nav
    description: >
      The canonical fund NAV, rolled up per fund (per share class where a fund carries
      them — this synthetic seed has none, so share_class is null), as-of-capable on the
      valuation knowledge-time axis. NAV = gross market value + accrued income − fees.
      The default strike is the current-knowledge value; setting the nav_knowledge_date
      variable re-strikes the NAV as the firm believed it on a past knowledge date, from
      the bi-temporal valuation history. The default current strike is sound. A past-as-of
      strike, however, uses the latest holdings with as-of valuations because the holding
      state is latest-only — there is no holding history. On real holding history this
      mis-selects the constituent set (it includes positions opened after the knowledge
      date and excludes positions closed before the latest holding date), an error with no
      magnitude bound; do not strike a production past NAV on this path — a correct
      past-as-of NAV needs an as-of holdings (holding-history) view. Synthetic data — a
      green invariant proves the data-layer arithmetic and the current-strike plumbing,
      not a struck production NAV.
    columns:
      - name: fund_id
        description: The total-fund portfolio.
        data_tests: [unique, not_null]
      - name: nav_usd
        description: The NAV — gross market value + accrued income − fees.
        data_tests: [not_null]
      - name: gross_market_value
        description: Σ of the held positions' current (or as-of) valuations.
        data_tests: [not_null]
      - name: fees
        description: >
          Management charges and fees deducted. Zero on this synthetic seed — no fee
          source is seeded; the term is present in the NAV identity so it carries a fee
          source with no reshape.
        data_tests: [not_null]

  - name: mart_performance_appraisal
    description: >
      The current-knowledge performance results with their appraisal context — the
      subject fund/portfolio, its name and type. One row per current-knowledge return
      (latest-recomputed per logical performance key); the as-struck figure stays
      queryable in the versioned performance model. Synthetic, illustrative returns —
      not benchmarked against a real fund or a GIPS/CFA worked example.
    columns:
      - name: performance_result_id
        description: The performance result (current-knowledge).
        data_tests: [unique, not_null]
      - name: subject_id
        description: The fund or portfolio the return is for.
        data_tests: [not_null]
      - name: return_value
        description: The return (a rate).
        data_tests: [not_null]
