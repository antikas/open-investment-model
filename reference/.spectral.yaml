# Spectral ruleset for the agentINVEST bd09 OpenAPI surface.
#
# WHAT THIS LINTS. Restate auto-generates the bd09 OpenAPI 3.1 spec from the
# handler signatures (the Pydantic ExecuteSoInput/Output models). `openapi-spec-validator`
# (the Python surface) checks it is STRUCTURALLY a valid 3.1 document; Spectral
# checks STYLE/QUALITY against the built-in `spectral:oas` ruleset. The lint runs
# against the captured-fixture spec (deterministic CI gate) and the live-fetched
# spec when the substrate is up (corroboration) — see scripts/openapi-lint.mjs.
#
# SSOT DISCIPLINE. The spec is Restate-auto-generated, NEVER hand-written. The
# bd09 handler surface we OWN (the two handler operations + the typed
# `execute_soRequest`/`execute_soResponse` envelope schemas) lints CLEAN under
# `spectral:oas` with zero exceptions. Every exception below is tied to a
# specific Restate EMITTER characteristic on the auto-generated invoke/error
# BOILERPLATE (the standard delay/idempotency parameters, the generic-error
# response, the minimal info block, the per-handler tags, the ingress server
# URL) — never to silence a finding on a real defect in our own surface. If a
# `spectral:oas` rule ever fires on the bd09 handler operations or our envelope
# schemas, the fix is the surface (the handlers), not a new exception here.
extends: ["spectral:oas"]
rules:
  # --- Restate emitter-boilerplate exceptions (each tied to the auto-gen, not our surface) ---

  # `oas3-valid-media-example` (ERROR -> off): Restate emits a hard-coded
  # `GenericError` response whose `example` is `{code, message, description}`,
  # but Restate's OWN `RestateError` schema declares `{code, message, metadata,
  # stacktrace}` with `additionalProperties: false` — so the emitter's own
  # example does not validate against the emitter's own error schema. This is a
  # Restate emitter inconsistency on its generic-error boilerplate, not a defect
  # in any example WE author (our surface emits no examples). Disabling it does
  # not mask one of our findings: were our surface to add an example that
  # mismatched its schema, that would be a real defect — but the surface tracks
  # the handlers and authors no examples, so this rule only ever fires on
  # Restate's generic-error boilerplate. Re-enable if our surface starts
  # emitting examples.
  oas3-valid-media-example: off

  # `oas3-unused-component` (WARN -> off): Restate emits the standard `delay` +
  # `idempotencyKey` request parameters into `components.parameters` for the
  # invoke patterns, but our two arity-0/arity-1 handler operations do not
  # reference them, so Spectral flags them unused. Emitter boilerplate, not a
  # stray component we left behind.
  oas3-unused-component: off

  # `operation-tags` (WARN -> off): Restate does not emit a per-operation `tags`
  # array on the `/bd09/execute_so` + `/bd09/list_capabilities` handler
  # operations (it emits top-level tags only, for the Request-Response/Send/
  # Attach/Get-Output invoke patterns). Absent per-operation tags is an emitter
  # characteristic; we never hand-add tags (that would edit the auto-gen spec).
  operation-tags: off

  # `info-contact` + `info-description` (WARN -> off): Restate emits a minimal
  # `info` block (`{title, version}`) with no contact/description. Populating
  # them would mean hand-editing the auto-generated spec (violating SSOT — the
  # surface tracks the handlers). Emitter minimalism, not a missing field we own.
  info-contact: off
  info-description: off

  # `oas3-server-trailing-slash` (WARN -> off): Restate emits the ingress server
  # URL with a trailing slash (`http://127.0.0.1:8080/`). The server URL is the
  # emitter's, derived from the Restate ingress bind; we do not rewrite it.
  oas3-server-trailing-slash: off
