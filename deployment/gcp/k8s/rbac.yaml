apiVersion: v1
kind: ServiceAccount
metadata:
  name: agentinvest-sa
  namespace: agentinvest
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: agentinvest-role
  namespace: agentinvest
rules:
  - apiGroups: [""]
    resources: ["pods", "services", "secrets", "configmaps"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: agentinvest-rolebinding
  namespace: agentinvest
subjects:
  - kind: ServiceAccount
    name: agentinvest-sa
    namespace: agentinvest
roleRef:
  kind: Role
  name: agentinvest-role
  apiGroup: rbac.authorization.k8s.io
